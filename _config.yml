# Site settings
title: Alassane Diop
email: alassanedialdiop@gmail.com
description: >-
  Alassane Diop - ML / AI Engineer building and shipping AI systems — recommendation engines,
  computer vision, LLM pipelines, and scalable data infrastructure. Based in Montreal, Quebec.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://alassane.ai" # your custom domain

# Open Graph defaults
tagline: "ML Engineer"
author:
  name: Alassane Diop
defaults_og:
  image: /assets/alassane-portrait.png

# jekyll-seo-tag defaults
twitter:
  card: summary_large_image
social:
  name: Alassane Diop
  links:
    - https://www.linkedin.com/in/alassanediop/

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalinks
permalink: pretty

# Collections
collections:
  pages:
    output: true
    permalink: /:name/
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"