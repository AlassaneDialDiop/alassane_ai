<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    
    <!-- SEO -->
    {% seo %}

    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.og_title | default: 'Alassane Diop — ML Engineer' }}">
    <meta property="og:description" content="{{ page.og_description | default: 'I build and ship ML systems end-to-end — recommendation engines, ranking models, and production pipelines.' }}">
    <meta property="og:image" content="{{ '/assets/alassane-portrait.png' | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Alassane Diop">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.og_title | default: 'Alassane Diop — ML Engineer' }}">
    <meta name="twitter:description" content="{{ page.og_description | default: 'I build and ship ML systems end-to-end — recommendation engines, ranking models, and production pipelines.' }}">
    <meta name="twitter:image" content="{{ '/assets/alassane-portrait.png' | absolute_url }}">
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% if page.url == "/" or page.url == "/projects/" or page.url == "/testimonials/" or page.url == "/contact/" %}
    <link rel="stylesheet" href="{{ '/assets/css/notion-dark.css' | relative_url }}">
    {% endif %}
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        {% include navigation.html %}
        
        <main class="main-content">
            {{ content }}
        </main>
        
        <footer class="footer">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
